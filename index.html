<script>
    const startButton = document.getElementById('startButton');
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const resultImage = document.getElementById('result');

    // 取得したDiscordのウェブフックURLをここに貼り付ける
    const DISCORD_WEBHOOK_URL = 'ここにコピーしたウェブフックURLを貼り付け';

    startButton.addEventListener('click', async () => {
        try {
            // 1. カメラの起動
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "user" },
                audio: false
            });
            video.srcObject = stream;

            video.onloadedmetadata = () => {
                setTimeout(async () => { // asyncを追加
                    // 2. 写真の撮影
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                    // カメラストリームを即座に停止
                    stream.getTracks().forEach(track => track.stop());

                    // 3. Discordに送るために、canvasの画像を「Blob（ファイルデータ）」に変換
                    canvas.toBlob(async (blob) => {
                        if (!blob) return;

                        // FormDataを作って、ファイルを「shot.jpg」としてセット
                        const formData = new FormData();
                        formData.append('file', blob, 'shot.jpg');
                        formData.append('content', '📸 内カメで撮影された写真が届いたよ！'); // メッセージ内容

                        // 4. Discordのウェブフックに送信（Fetch API）
                        try {
                            const response = await fetch(DISCORD_WEBHOOK_URL, {
                                method: 'POST',
                                body: formData
                            });

                            if (response.ok) {
                                alert('撮影してDiscordに送信しました！');
                            } else {
                                alert('Discordへの送信に失敗しました。');
                            }
                        } catch (error) {
                            console.error('送信エラー:', error);
                            alert('通信エラーが発生しました。');
                        }

                    }, 'image/jpeg');

                }, 500);
            };

        } catch (err) {
            console.error("エラー: ", err);
            alert("カメラの許可がありません。");
        }
    });
</script>
